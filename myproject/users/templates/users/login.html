{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eventify - Login</title>
    <link rel="stylesheet" href="{% static 'users/css/style.css' %}" />
    <link rel="stylesheet" href="{% static 'users/css/auth_pages.css' %}" />
  </head>
  <body>
    <main class="page-card">
          <h1>Welcome back</h1>
          <p class="subtitle">Sign in to your Eventify account.</p>

          <form id="login-form" method="post" action="{% url 'users:login' %}">
            {% csrf_token %}
            <div
              class="auth-tabs"
              role="tablist"
              aria-label="Select account type"
            >
              <button
                class="auth-tab active"
                type="button"
                data-role="client"
                role="tab"
                aria-selected="true"
              >
                Client
              </button>
              <button
                class="auth-tab"
                type="button"
                data-role="vendor"
                role="tab"
                aria-selected="false"
              >
                Vendor
              </button>
              <button
                class="auth-tab"
                type="button"
                data-role="admin"
                role="tab"
                aria-selected="false"
              >
                Admin
              </button>
            </div>
            <input id="login-role" type="hidden" name="role" value="client" />
            <div class="field">
              <label for="client-email">Email</label>
              <input
                id="client-email"
                name="email"
                type="email"
                placeholder="Enter email"
                required
              />
            </div>
            <div class="field">
              <label for="client-password">Password</label>
              <input
                id="client-password"
                name="password"
                type="password"
                placeholder="Enter password"
                required
              />
            </div>
            <div class="row auth-row-utility">
              <label class="remember" for="client-remember">
                <input id="client-remember" name="remember" type="checkbox" /> Remember me
              </label>
            </div>
            <button class="submit-btn" type="submit">Sign In</button>

            <div class="auth-divider">OR</div>
            <div class="auth-socials">
              <button class="btn social-btn" type="button">
                <span class="social-icon">G</span>
                <span>{{ google_label }}</span>
              </button>
            </div>

            <p class="status-text"></p>
          </form>
    </main>
    <script src="{% static 'users/js/login.js' %}"></script>
  </body>
</html>
