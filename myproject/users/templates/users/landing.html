<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eventify - {{ role_label }}</title>
    <style>
      :root {
        --ink: #141210;
        --accent: #c9420e;
        --accent-mid: #e8602a;
        --teal: #0e7c72;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #ffffff;
        color: var(--ink);
        font-family: Arial, Helvetica, sans-serif;
      }

      .landing-copy {
        text-align: center;
        max-width: 680px;
      }

      .landing-copy h1 {
        margin: 0;
        font-size: clamp(2rem, 6vw, 4rem);
        font-weight: 800;
        letter-spacing: -0.05em;
      }

      .landing-copy p {
        margin: 14px 0 0;
        font-size: clamp(1rem, 2vw, 1.2rem);
        color: #5f5a55;
      }

      .landing-copy strong {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main class="landing-copy">
      <h1>{{ message }}</h1>
      <p>{{ role_label }} access is active for {{ user_name }}.</p>
    </main>
  </body>
</html>
