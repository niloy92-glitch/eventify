<div class="modal" id="client-event-modal" aria-hidden="true">
  <div class="modal-panel event-modal-panel">
    <div class="row-between">
      <h2 id="client-event-modal-title">Create Event</h2>
      <button type="button" class="service-detail-close" data-close-modal="client-event-modal" aria-label="Close">×</button>
    </div>

    <form id="client-event-form" method="post" action="{% url 'events:client_event_create' %}" data-create-url="{% url 'events:client_event_create' %}" data-update-url-template="{% url 'events:client_event_update' 0 %}" class="service-form event-form">
      {% csrf_token %}
      <input type="hidden" name="event_id" id="client-event-id" />

      <div class="form-field">
        <label for="client-event-title">Event title</label>
        {{ event_form.title }}
      </div>

      <div class="form-field">
        <label for="client-event-date">Event date</label>
        {{ event_form.event_date }}
      </div>

      <div class="form-field">
        <label for="client-event-venue-name">Venue name</label>
        {{ event_form.venue_name }}
      </div>

      <div class="form-field">
        <label for="client-event-venue-address">Venue address</label>
        {{ event_form.venue_address }}
      </div>

      <label class="event-own-venue-field">
        {{ event_form.has_own_venue }}
        <span>I already have my own venue</span>
      </label>

      <div class="form-field">
        <label for="client-event-notes">Notes</label>
        {{ event_form.notes }}
      </div>

      <div class="modal-actions">
        <button type="button" class="btn" data-close-modal="client-event-modal">Cancel</button>
        <button type="submit" class="btn btn-primary" id="client-event-submit">Save Event</button>
      </div>
    </form>
  </div>
</div>
