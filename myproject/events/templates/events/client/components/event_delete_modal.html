<div class="modal" id="event-delete-modal" aria-hidden="true">
  <div class="modal-panel">
    <h2 id="event-delete-title">Delete Event</h2>
    <p id="event-delete-text">Enter your password to delete this event.</p>
    <form id="event-delete-form" method="post" action="{% url 'events:client_event_delete' 0 %}" data-delete-url-template="{% url 'events:client_event_delete' 0 %}">
      {% csrf_token %}
      <input type="password" name="password" id="event-delete-password" placeholder="Password" />
      <div class="modal-actions">
        <button type="button" class="btn" data-close-modal="event-delete-modal">Cancel</button>
        <button type="submit" class="btn danger-btn">Delete</button>
      </div>
    </form>
  </div>
</div>
