{% if page_obj.paginator.num_pages > 1 %}
  <nav class="pagination service-pagination" aria-label="Services pagination">
    <div class="page-meta">
      Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}
    </div>
    <div class="service-pagination-actions">
      {% if page_obj.has_previous %}
        <a class="btn" href="{% if query_string %}?{{ query_string }}&page={{ page_obj.previous_page_number }}{% else %}?page={{ page_obj.previous_page_number }}{% endif %}">Previous</a>
      {% else %}
        <span class="btn disabled" aria-disabled="true">Previous</span>
      {% endif %}

      {% if page_obj.has_next %}
        <a class="btn btn-primary" href="{% if query_string %}?{{ query_string }}&page={{ page_obj.next_page_number }}{% else %}?page={{ page_obj.next_page_number }}{% endif %}">Next</a>
      {% else %}
        <span class="btn btn-primary disabled" aria-disabled="true">Next</span>
      {% endif %}
    </div>
  </nav>
{% endif %}
