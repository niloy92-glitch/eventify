<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}{{ brand_name|default:"Eventify" }}{% endblock %}</title>
</head>
<body style="margin:0;padding:0;background:{{ brand_bg|default:'#fff7ed' }};font-family:Arial,Helvetica,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:{{ brand_bg|default:'#fff7ed' }};padding:32px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="width:100%;max-width:560px;">
          <tr>
            <td align="center" style="padding-bottom:18px;">
              <span style="font-size:30px;font-weight:800;color:{{ brand_text|default:'#1f2937' }};letter-spacing:-0.03em;">{{ brand_name|default:"Eventify" }}</span>
            </td>
          </tr>
          <tr>
            <td style="background:{{ brand_card|default:'#ffffff' }};border:1px solid #fed7aa;border-radius:16px;padding:30px 24px;">
              {% block content %}{% endblock %}
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-top:16px;color:{{ brand_muted|default:'#6b7280' }};font-size:12px;">
              &copy; {% now "Y" %} {{ brand_name|default:"Eventify" }}
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
